name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Sklad.NET.slnx

      - name: Build
        run: dotnet build Sklad.NET.slnx --no-restore --configuration Release --warnaserror

      - name: Test
        run: dotnet test Sklad.Tests/Sklad.Tests.csproj --no-build --configuration Release --verbosity normal
